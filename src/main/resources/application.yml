spring:
  profiles:
    active: test
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  expiration: 604800 # 7天
